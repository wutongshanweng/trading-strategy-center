# Trading Strategy Center — CI/CD Pipeline
name: CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ─── Python 测试 ──────────────────────────────────────────────────
  test-python:
    name: "Python Tests (Python ${{ env.PYTHON_VERSION }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -x --tb=short -v --timeout=60 2>&1 | tail -50

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -x --tb=short -v --timeout=60 2>&1 | tail -50

      - name: Check Python syntax
        run: |
          python -m compileall -q core/ tests/ api/ tournament/

      - name: Verify alpha factors
        run: |
          python -c "
          from core.alpha.alpha101.factor_registry import FactorRegistry
          FactorRegistry.ensure_initialized()
          names = FactorRegistry.list_all()
          print(f'Alpha factors registered: {len(names)}')
          assert len(names) >= 101, f'Expected >=101, got {len(names)}'
          "

  # ─── 前端构建 ────────────────────────────────────────────────────
  build-frontend:
    name: "Frontend Build (Node ${{ env.NODE_VERSION }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker 构建 (仅 push 到 master) ────────────────────────────
  docker-build:
    name: "Docker Build"
    if: github.event_name == 'push' && github.ref_name == 'master'
    needs: [test-python, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trading-strategy-center:latest
            ${{ secrets.DOCKER_USERNAME }}/trading-strategy-center:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 检查 Python 打包 ───────────────────────────────────────────
  check-package:
    name: "Python Packaging Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check pyproject.toml
        run: |
          pip install build
          python -m build --sdist --check
      - name: Verify setup
        run: |
          pip install -e .
          python -c "import core; print('Package OK:', core.__name__)"
